<!DOCTYPE html>
<html>
<head>
  <title>UMDeezNuts</title>
</head>
<body>
  <h1>Upcoming Shuttles</h1>
  <div id="departures"></div>

  <script>
    async function loadDepartures() {
      const response = await fetch("/api/departures");
      const data = await response.json();

      const container = document.getElementById("departures");
      container.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");
        div.innerHTML = `
          <h3>${item.stop_name}</h3>
          <p>Route ${item.route_short_name} — ${item.trip_headsign}</p>
          <p>${item.arrival_display} (${item.minutes_away} min)</p>
          <hr>
        `;
        container.appendChild(div);
      });
    }

    loadDepartures();
  </script>
</body>
</html>
